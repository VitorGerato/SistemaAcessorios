<!-- Página de perfil onde o funcionário visualiza e gerencia suas reservas. -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Perfil do Usuário</title>
  <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
  <script>
    // Verifica se o usuário está logado consultando o backend
    fetch("php/check_sessao.php")
      .then(res => {
        if (res.status !== 200) {
          // Redireciona para a página de login caso não esteja logado
          window.location.href = "login.html";
        }
      })
      .catch(() => {
        // Em caso de erro de rede, também redireciona como precaução
        window.location.href = "login.html";
      });
  </script>
  
  <!-- Layout principal da página de perfil do usuário -->
  <div class="layout">

    <!-- Menu lateral -->
    <div class="sidebar">
      <div>
        <img src="img/logoEscola.png" alt="Logo da Escola" class="logo-img">
        <h2>Menu</h2>
        <button onclick="window.location.href='reserva.html'">Reservas</button>
        <button onclick="window.location.href='perfil.html'">Perfil</button>
      </div>
      <button onclick="window.location.href='login.html'">Sair</button>
    </div>

    <!-- Conteúdo principal -->
    <div class="main">
      <div class="perfil-box">
        <div class="foto">
          <img src="img/usuarioFoto.png" alt="Foto do Usuário">
        </div>
        <div class="info">
          <h2 id="nome-usuario">Carregando ...</h2>
          <p id="re-usuario">RE: ...</p>
          <p id="status-usuario">Status: ...</p>
        </div>
      </div>

      <!-- Histórico de reservas -->
      <div class="historico">
        <h3>Histórico de Pedidos</h3>
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Produto</th>
              <th>Categoria</th>
              <th>Status</th>
              <th>Observações</th>
            </tr>
          </thead>
          <tbody id="historico-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Script JS com verificação de gênero e histórico -->
  <script src="js/perfil.js"></script>

</body>
</html>
